# ═══════════════════════════════════════════════════════════════════════════════
# BORING RUST: Rustfmt Configuration for Technical Architecture
# ═══════════════════════════════════════════════════════════════════════════════
#
# Optimized for:
# - Readable diffs (agent-generated code changes frequently)
# - Consistent tokenization (LLMs see consistent patterns)
# - Vertical clarity (easier to reason about line-by-line)
#
# Note: Only stable rustfmt options are used.
# ═══════════════════════════════════════════════════════════════════════════════

edition = "2021"

# ─────────────────────────────────────────────────────────────────────────────────
# LINE WIDTH & WRAPPING
# ─────────────────────────────────────────────────────────────────────────────────

# Match clippy.toml line length
max_width = 120

# ─────────────────────────────────────────────────────────────────────────────────
# FORMATTING CHOICES (stable only)
# ─────────────────────────────────────────────────────────────────────────────────

# Tabs vs spaces
hard_tabs = false
tab_spaces = 4

# Newline style (Unix = LF)
newline_style = "Unix"

# ─────────────────────────────────────────────────────────────────────────────────
# IMPORTS
# ─────────────────────────────────────────────────────────────────────────────────

# Reorder imports alphabetically
reorder_imports = true
reorder_modules = true

# ─────────────────────────────────────────────────────────────────────────────────
# MISC
# ─────────────────────────────────────────────────────────────────────────────────

# Use field init shorthand: Foo { bar } not Foo { bar: bar }
use_field_init_shorthand = true

# Use try shorthand: ? not try!
use_try_shorthand = true
