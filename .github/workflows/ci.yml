name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache Rust build artifacts
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          technical_architecture/target
        key: ${{ runner.os }}-cargo-python-${{ matrix.python-version }}-${{ hashFiles('technical_architecture/Cargo.lock') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin[patchelf] ruff flake8
        pip install -e ".[vision]"
        # Install PyTorch for DDSP/Jetson tests (Module 3 & 4)
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Build Rust technical architecture (Python bindings)
      run: |
        cd technical_architecture
        maturin build --release --features python-bindings
        pip install target/wheels/technical_architecture*.whl
        cd ..

    - name: Run Python tests
      run: |
        python -m pytest tests/ -v --tb=short \
          --ignore=tests/test_shared_memory_ipc.py \
          --ignore=tests/test_realtime_dependencies.py \
          --ignore=tests/test_17d_metadata_synthesis.py \
          --ignore=tests/archive_experimental/ \
          --ignore=tests/archive/

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./technical_architecture
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: ${{ matrix.rust }}
        override: true
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          technical_architecture/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('technical_architecture/Cargo.lock') }}

    - name: Build Rust
      run: cargo build --verbose

    - name: Run Rust tests
      run: cargo test --lib --verbose

    - name: Run Rust tests (release)
      run: cargo test --lib --release --verbose

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./technical_architecture

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff flake8

    - name: Check formatting with ruff
      run: |
        ruff format --check . --exclude "presentation_video.py" --exclude "pub.py" --exclude "technical_architecture/scripts/*" --exclude "tests/archive_experimental/*" --exclude "tests/archive/*" --exclude "archive/*" --exclude "realtime/archive/*" --exclude "analysis/*"

    - name: Lint with ruff
      run: |
        ruff check . --exclude "presentation_video.py" --exclude "pub.py" --exclude "technical_architecture/scripts/*" --exclude "tests/archive_experimental/*" --exclude "tests/archive/*" --exclude "archive/*" --exclude "realtime/archive/*" --exclude "analysis/*"

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude="presentation_video.py,pub.py,technical_architecture/scripts/*,tests/archive_experimental/*,tests/archive/*,archive/*,realtime/archive/*,analysis/*"

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin[patchelf]
        pip install -e ".[vision]"  # Includes numpy, pandas, pytest, opencv, mediapipe
        # Install PyTorch for DDSP/Jetson tests (Module 3 & 4)
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Build Rust library (maturin)
      run: |
        cd technical_architecture
        maturin build --release --features python-bindings
        pip install target/wheels/technical_architecture*.whl
        cd ..

    - name: Run integration tests
      run: |
        python -m pytest tests/test_rust_python_integration.py -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests, integration-test]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Python Tests: ${{ needs.python-tests.result }}"
        echo "Rust Tests: ${{ needs.rust-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-test.result }}"
        if [ "${{ needs.python-tests.result }}" != "success" ] || \
           [ "${{ needs.rust-tests.result }}" != "success" ] || \
           [ "${{ needs.integration-test.result }}" != "success" ]; then
          echo "::error::Some tests failed"
          exit 1
        fi
        echo "All tests passed!"
