name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('src/**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache Rust build artifacts
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src/technical_architecture/target
        key: ${{ runner.os }}-cargo-python-${{ matrix.python-version }}-${{ hashFiles('src/technical_architecture/Cargo.lock') }}

    - name: Install dependencies
      working-directory: ./src
      run: |
        python -m pip install --upgrade pip
        pip install maturin[patchelf]
        pip install -e .

    - name: Build Rust technical architecture (Python bindings)
      working-directory: ./src/technical_architecture
      run: |
        maturin build --release --features python-bindings
        pip install target/wheels/technical_architecture*.whl

    - name: Run Python tests
      working-directory: ./src
      run: |
        python -m pytest tests/ -v --tb=short --ignore=tests/test_rust_island_hopping.py --ignore=tests/test_rust_python_integration.py --ignore=tests/test_17d_metadata_synthesis.py --ignore=tests/test_vector_delta_synthesis.py --ignore=tests/test_interpolation_extrapolation.py --ignore=tests/test_granular_synthesis_limitations.py --ignore=tests/test_island_hopping_navigation.py --ignore=tests/test_shared_memory_ipc.py --ignore=tests/archive_experimental/ --ignore=tests/test_visual_fusion.py

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/technical_architecture
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: ${{ matrix.rust }}
        override: true
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src/technical_architecture/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('src/technical_architecture/Cargo.lock') }}

    - name: Build Rust
      run: cargo build --verbose

    - name: Run Rust tests
      run: cargo test --verbose

    - name: Run Rust tests (release)
      run: cargo test --release --verbose

    - name: Run Rust benchmarks
      run: cargo run --example benchmark_peer_controller --release

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/technical_architecture

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff flake8

    - name: Check formatting with ruff
      working-directory: ./src
      run: |
        ruff format --check . --exclude archive/

    - name: Lint with ruff
      working-directory: ./src
      run: |
        ruff check . --exclude archive/

    - name: Lint with flake8
      working-directory: ./src
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=archive/
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=archive/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Install Python dependencies
      working-directory: ./src
      run: |
        python -m pip install --upgrade pip
        pip install maturin[patchelf]
        pip install pytest numpy pandas

    - name: Build Rust library (maturin)
      working-directory: ./src/technical_architecture
      run: |
        maturin build --release --features python-bindings
        pip install target/wheels/technical_architecture*.whl

    - name: Run integration tests
      working-directory: ./src
      run: |
        python -m pytest tests/test_rust_python_integration.py -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests, integration-test]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Python Tests: ${{ needs.python-tests.result }}"
        echo "Rust Tests: ${{ needs.rust-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-test.result }}"
        if [ "${{ needs.python-tests.result }}" != "success" ] || \
           [ "${{ needs.rust-tests.result }}" != "success" ] || \
           [ "${{ needs.integration-test.result }}" != "success" ]; then
          echo "::error::Some tests failed"
          exit 1
        fi
        echo "All tests passed!"
