name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install numpy pandas scipy matplotlib
        pip install scikit-learn torch torchvision

    - name: Run Python tests
      run: |
        python -m pytest tests/ -v --tb=short

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./technical_architecture
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: ${{ matrix.rust }}
        override: true
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          technical_architecture/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('technical_architecture/Cargo.lock') }}

    - name: Build Rust
      run: cargo build --verbose

    - name: Run Rust tests
      run: cargo test --verbose

    - name: Run Rust tests (release)
      run: cargo test --release --verbose

    - name: Run Rust benchmarks
      run: cargo run --example benchmark_peer_controller --release

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./technical_architecture

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check formatting with black
      run: |
        black --check .

    - name: Check import sorting with isort
      run: |
        isort --check-only .

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy pandas

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Build Rust library
      run: |
        cd technical_architecture
        cargo build --release

    - name: Run integration tests
      run: |
        python -m pytest tests/test_zero_copy_rust.py -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests, integration-test]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Python Tests: ${{ needs.python-tests.result }}"
        echo "Rust Tests: ${{ needs.rust-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-test.result }}"
        if [ "${{ needs.python-tests.result }}" != "success" ] || \
           [ "${{ needs.rust-tests.result }}" != "success" ] || \
           [ "${{ needs.integration-test.result }}" != "success" ]; then
          echo "::error::Some tests failed"
          exit 1
        fi
        echo "All tests passed!"
