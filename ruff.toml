# Ruff configuration for animal vocalization analysis project

# Target Python 3.9+
target-version = "py39"

# Line length
line-length = 100

[lint]
# Ignore E402 (module level import not at top of file) - these are intentional
# for sys.path manipulation to enable local imports
ignore = ["E402"]

# Enable additional rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
]

# Per-file ignores
[lint.per-file-ignores]
# F821: Undefined names - these are Rust bindings available at runtime
"tests/test_rust_python_integration.py" = ["F821"]
# E501: Line too long - these are report template strings
"technical_architecture/bat_rfe_analysis.py" = ["E501"]
